name: Daily Auto commit [Miden]

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate daily log
        run: |
          cat > daily-log.md << EOF
# Miden Activity Log
## $(date '+%Y-%m-%d %H:%M:%S')

- [x] Daily contribution maintained

---
EOF

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "demarco2016"
          git config user.email "demarco2016@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Auto commit [Miden] $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi